<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RCKid</title>
<style>
    body {
        margin: 0;
        height: 100vh;
         
        background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("right.jpg"), url("left.jpg");
        background-position: center, left top, right top;
        background-size: 100% 100%, 50% 100%, 50% 100%;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        font-size: 2em;
    }

    .container {
        text-align: center;
        color: yellow;
    }

    img {
        height: 50vh;
        display: block;
        margin: 0 auto 20px auto;
    }

    a:link {
        color: #ff00ff; 
    }

    a:visited {
        color: #ff00ff; 
    }

    a:hover {
        color: #ff00ff; 
    }

    a:active {
        color: #ff00ff; 
    }

</style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Centered Image">
    <p><a href="https://github.com/rc-kid/rckid/blob/main/VISION.md">Vision</a> - <a href="https://github.com/rc-kid/rckid/">GitHub</a></p>
</div>

</body>
</html>
