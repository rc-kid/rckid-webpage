<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Centered Image + Button</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
        color: white;
    }

    img {
        max-width: 300px;
        height: auto;
        display: block;
        margin: 0 auto 20px auto;
    }

    a:link {
        color: #0d6efd; /* normal blue */
    }

    a:visited {
        color: #0d6efd; /* same blue even after visiting */
    }

    a:hover {
        color: #0b5ed7; /* optional hover color */
    }

    a:active {
        color: #0a58ca; /* optional click color */
    }


</style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Centered Image">
    <a href="https://github.com/rc-kid/rckid/blob/main/VISION.md">Vision</a> - <a href="https://github.com/rc-kid/rckid/">GitHub</a>
</div>

</body>
</html>
